<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family: Arial, sans-serif;
  overflow:hidden;
  background: linear-gradient(270deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
  background-size: 800% 800%;
  animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  color:white;
  text-shadow:0 3px 10px rgba(0,0,0,0.2);
}

img{
  width:220px;
  margin:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

#yesButton{
  background:#00ffcc;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#yesButton:hover{
  transform:scale(1.1);
}

#noButton{
  background:#ff6b6b;
  color:white;
  position:relative;
}

.heart{
  position:absolute;
  color:white;
  animation: float 5s linear infinite;
  font-size:20px;
}

@keyframes float{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-800px); opacity:0;}
}

</style>
</head>

<body>

<h1 id="message">Would you go on a date with me? 💖</h1>
<img id="cuteGif" src="cute.gif">

<div>
<button id="yesButton">Yes 😍</button>
<button id="noButton">No 😅</button>
</div>

<script>

let yesBtn = document.getElementById("yesButton");
let noBtn = document.getElementById("noButton");
let msg = document.getElementById("message");
let gif = document.getElementById("cuteGif");

let yesScale = 1;

yesBtn.addEventListener("click", () => {
    msg.innerHTML = "Yayyyyy!!! I knew it 😍❤️";
    gif.src = "new_cute.gif";
    noBtn.style.display = "none";
    createHearts();
});

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    yesScale += 0.1;
    yesBtn.style.transform = `scale(${yesScale})`;
});

function createHearts(){
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (Math.random()*20+10) + "px";
        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);

    },300);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Question For You 💖</title>
<style>

/* ========== CONFIGURATION ========== */
/* Edit these values to customize */
:root {
  --color-a: #ff6b9d;
  --color-b: #ff8fab;
  --color-c: #ffc8dd;
  --color-d: #ffb3c6;
}

/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow-x: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2, #ff9a9e, #fad0c4);
  background-size: 400% 400%;
  animation: bgShift 12s ease infinite;
  padding: 16px;
  position: relative;
}

/* ========== BACKGROUND ANIMATIONS ========== */
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating hearts layer */
#hearts-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-heart {
  position: absolute;
  bottom: -60px;
  animation: floatUp linear infinite;
  opacity: 0;
  user-select: none;
  font-size: 18px;
}

@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-110vh) rotate(360deg) scale(0.5); opacity: 0; }
}

/* Particles */
.particle {
  position: fixed;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.5);
  animation: sparkle linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes sparkle {
  0%   { transform: translate(0, 0) scale(1); opacity: 0; }
  50%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* ========== MAIN CARD ========== */
#main-card {
  position: relative;
  z-index: 10;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 28px;
  padding: clamp(24px, 5vw, 48px);
  max-width: 480px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(255, 107, 157, 0.3), 0 0 0 1px rgba(255,255,255,0.3) inset;
  animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes cardEnter {
  from { opacity: 0; transform: translateY(40px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== GIF / IMAGE ========== */
#main-gif {
  width: clamp(120px, 45vw, 200px);
  height: clamp(120px, 45vw, 200px);
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(255, 107, 157, 0.35);
  animation: imgPulse 3s ease-in-out infinite;
}

@keyframes imgPulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.04); }
}

/* ========== TYPOGRAPHY ========== */
#main-heading {
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 700;
  color: #c0305a;
  text-shadow: 0 2px 8px rgba(255,255,255,0.6);
  margin-bottom: 8px;
  line-height: 1.3;
  transition: all 0.5s ease;
}

#sub-text {
  font-size: clamp(13px, 3vw, 16px);
  color: #d45a7a;
  margin-bottom: 28px;
  font-style: italic;
  opacity: 0.9;
}

/* ========== FUNNY MESSAGE ========== */
#funny-msg {
  min-height: 24px;
  font-size: clamp(13px, 3vw, 15px);
  color: #b83060;
  font-weight: 600;
  margin-bottom: 16px;
  transition: opacity 0.3s ease;
  opacity: 0;
}

#funny-msg.show { opacity: 1; }

/* ========== BUTTONS ========== */
#btn-wrap {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
}

.btn {
  border: none;
  border-radius: 50px;
  font-size: clamp(15px, 4vw, 18px);
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, font-size 0.3s;
  padding: 14px 32px;
  min-width: 110px;
  min-height: 52px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#yes-btn {
  background: linear-gradient(135deg, #ff6b9d, #ff4d79);
  color: white;
  box-shadow: 0 6px 20px rgba(255, 77, 121, 0.45);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, font-size 0.4s;
}

#yes-btn:hover, #yes-btn:focus {
  transform: scale(1.08);
  box-shadow: 0 10px 28px rgba(255, 77, 121, 0.6);
  outline: none;
}

#no-btn {
  background: rgba(255, 255, 255, 0.55);
  color: #c0305a;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  border: 1.5px solid rgba(255, 107, 157, 0.4);
  position: relative;
}

#no-btn:hover, #no-btn:focus { outline: none; }

/* ========== MUTE BUTTON ========== */
#mute-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 20px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}

#mute-btn:hover { transform: scale(1.1); }
#mute-btn.visible { display: flex; }

/* ========== CONFETTI ========== */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 12px;
  top: -20px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  pointer-events: none;
  z-index: 200;
}

@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Rain hearts after YES */
.rain-heart {
  position: fixed;
  top: -40px;
  animation: rainFall linear forwards;
  pointer-events: none;
  z-index: 150;
  font-size: 22px;
  opacity: 0.85;
}

@keyframes rainFall {
  0%   { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(180deg); opacity: 0; }
}

/* ========== GLOW OVERLAY ========== */
#glow-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  background: radial-gradient(ellipse at center, rgba(255,107,157,0.15) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 1s ease;
}

#glow-overlay.active { opacity: 1; animation: glowPulse 3s ease-in-out infinite; }

@keyframes glowPulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

/* ========== SUCCESS SCREEN ========== */
#success-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: linear-gradient(135deg, #ff6b9d, #ff4d79, #ff8fab, #ff6b9d);
  background-size: 300% 300%;
  animation: bgShift 8s ease infinite;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

#success-screen.show { display: flex; animation: bgShift 8s ease infinite, fadeIn 0.8s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}

#success-screen h1 {
  font-size: clamp(26px, 7vw, 42px);
  color: white;
  text-shadow: 0 4px 16px rgba(0,0,0,0.2);
  margin-bottom: 12px;
  animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#success-screen p {
  font-size: clamp(16px, 4vw, 22px);
  color: rgba(255,255,255,0.9);
  margin-bottom: 28px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

@keyframes bounceIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

#success-gif {
  width: clamp(140px, 45vw, 220px);
  height: clamp(140px, 45vw, 220px);
  border-radius: 24px;
  object-fit: cover;
  margin-bottom: 24px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  border: 3px solid rgba(255,255,255,0.6);
}

#screenshot-btn {
  background: rgba(255,255,255,0.9);
  color: #c0305a;
  border: none;
  border-radius: 50px;
  padding: 14px 36px;
  font-size: clamp(15px, 4vw, 18px);
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  touch-action: manipulation;
}

#screenshot-btn:hover { transform: scale(1.06); box-shadow: 0 10px 30px rgba(0,0,0,0.25); }

#screenshot-msg {
  margin-top: 16px;
  font-size: clamp(14px, 3.5vw, 17px);
  color: rgba(255,255,255,0.95);
  font-style: italic;
  min-height: 28px;
  transition: opacity 0.4s;
  opacity: 0;
}

#screenshot-msg.show { opacity: 1; }

/* Sparkles on success screen */
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 20px;
  animation: sparklePop linear infinite;
  z-index: 310;
}

@keyframes sparklePop {
  0%   { transform: scale(0) rotate(0deg); opacity: 0; }
  30%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
}

/* ========== ALREADY SAID YES SCREEN ========== */
#already-yes {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 400;
  background: linear-gradient(135deg, #ff6b9d, #c0305a);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

#already-yes h1 {
  font-size: clamp(24px, 6vw, 38px);
  color: white;
  text-shadow: 0 4px 16px rgba(0,0,0,0.2);
  margin-bottom: 12px;
}

#already-yes p {
  font-size: clamp(15px, 4vw, 20px);
  color: rgba(255,255,255,0.9);
}

</style>
</head>
<body>

<!-- ========== CONFIGURATION — EDIT THESE ========== -->
<script>
// ===================================================
// CUSTOMIZE HERE — edit values as needed
// ===================================================
const CONFIG = {
  // Your cute/asking GIF URL (appears on the question screen)
  gifQuestion: "/workspaces/proposal/cute.gif",

  // Your happy/celebration GIF URL (appears after YES)
  gifHappy: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOW41bzZsc3dkdzVncWZldGFidzNmN2Vubm1kdnZwMXVsOXc3YWN5aSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/RrVzUOXldFe8M/giphy.gif",

  // Romantic background music MP3 URL (plays after YES click)
  musicUrl: "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3",

  // Google Apps Script URL for notification (replace with your URL)
  googleScriptUrl: "PASTE_URL_HERE",

  // How many times No moves before shrinking
  noMoveMax: 7
};
// ===================================================
</script>

<!-- Background floating hearts -->
<div id="hearts-bg"></div>

<!-- Glow overlay (activates on YES) -->
<div id="glow-overlay"></div>

<!-- Mute button -->
<button id="mute-btn" onclick="toggleMute()" aria-label="Toggle music">🔊</button>

<!-- ========== MAIN PROPOSAL CARD ========== -->
<div id="main-card">
  <img id="main-gif" src="" alt="Cute animation" loading="lazy">
  <h1 id="main-heading">Would you go on a date with me? ❤️</h1>
  <p id="sub-text">Because you make my heart skip a beat every single day 🌸</p>
  <div id="funny-msg" role="alert" aria-live="polite"></div>
  <div id="btn-wrap">
    <button class="btn" id="yes-btn" onclick="onYes()">Yes 😍</button>
    <button class="btn" id="no-btn">No 😅</button>
  </div>
</div>

<!-- ========== SUCCESS SCREEN ========== -->
<div id="success-screen" role="region" aria-label="Celebration screen">
  <h1>❤️ Date Confirmed ❤️</h1>
  <p>I can't wait for our date 🥰</p>
  <img id="success-gif" src="" alt="Happy celebration">
  <button id="screenshot-btn" onclick="onScreenshot()">Send Screenshot ❤️</button>
  <p id="screenshot-msg">Now send this screenshot to me 😘</p>
</div>

<!-- ========== ALREADY SAID YES (reopened) ========== -->
<div id="already-yes" role="region" aria-label="Already accepted">
  <h1>❤️ She Already Said Yes ❤️</h1>
  <p>Our date is officially on! 🥰✨</p>
</div>

<audio id="bg-music" loop preload="none"></audio>

<script>
// ========== STATE ==========
let noCount = 0;
let yesScale = 1;
let isMuted = false;
let music = document.getElementById('bg-music');
let noBtn = document.getElementById('no-btn');
let yesBtn = document.getElementById('yes-btn');

const FUNNY_MSGS = [
  "Are you sure? 🥺",
  "Think again 😢",
  "I already told my mom about you 😭",
  "My heart can't take this 💔",
  "Please reconsider ❤️",
  "You clicked the wrong button 😅",
  "Last chance 😭"
];

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  // Check if already accepted
  if (localStorage.getItem('dateAccepted') === 'yes') {
    document.getElementById('already-yes').style.display = 'flex';
    return;
  }

  // Set GIFs
  document.getElementById('main-gif').src = CONFIG.gifQuestion;
  document.getElementById('success-gif').src = CONFIG.gifHappy;

  // Setup music
  music.src = CONFIG.musicUrl;

  // Background floating hearts
  spawnBgHearts();
  spawnParticles();

  // No button — mouse hover
  noBtn.addEventListener('mouseover', moveNo);
  // No button — touch start (mobile)
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); }, { passive: false });
});

// ========== BACKGROUND HEARTS ==========
function spawnBgHearts() {
  const container = document.getElementById('hearts-bg');
  const emojis = ['❤️','💕','💗','💖','💓','🌸','💝'];
  for (let i = 0; i < 20; i++) {
    let h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (12 + Math.random() * 18) + 'px';
    let dur = 8 + Math.random() * 12;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (-Math.random() * dur) + 's';
    container.appendChild(h);
  }
}

function spawnParticles() {
  for (let i = 0; i < 15; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    let size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.setProperty('--tx', (Math.random() * 100 - 50) + 'px');
    p.style.setProperty('--ty', (Math.random() * 100 - 50) + 'px');
    let dur = 6 + Math.random() * 8;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = (-Math.random() * dur) + 's';
    document.body.appendChild(p);
  }
}

// ========== NO BUTTON BEHAVIOR ==========
function moveNo() {
  noCount++;

  // Vibrate on mobile
  if (navigator.vibrate) navigator.vibrate(80);

  // Show funny message
  let msgEl = document.getElementById('funny-msg');
  let idx = Math.min(noCount - 1, FUNNY_MSGS.length - 1);
  msgEl.textContent = FUNNY_MSGS[idx];
  msgEl.classList.add('show');

  // Grow YES button
  yesScale = Math.min(yesScale + 0.12, 2.2);
  yesBtn.style.transform = 'scale(' + yesScale + ')';

  if (noCount >= CONFIG.noMoveMax) {
    // Shrink and hide No button
    noBtn.style.transition = 'all 0.4s ease';
    noBtn.style.transform = 'scale(0.3)';
    noBtn.style.opacity = '0.3';
    noBtn.style.pointerEvents = 'none';
    return;
  }

  // Move No button to random safe position
  noBtn.style.position = 'fixed';
  noBtn.style.transition = 'none';

  let btnW = noBtn.offsetWidth || 110;
  let btnH = noBtn.offsetHeight || 52;
  let safeX = Math.max(8, Math.min(window.innerWidth - btnW - 8, Math.random() * (window.innerWidth - btnW - 16)));
  let safeY = Math.max(8, Math.min(window.innerHeight - btnH - 8, Math.random() * (window.innerHeight - btnH - 16)));

  noBtn.style.left = safeX + 'px';
  noBtn.style.top = safeY + 'px';
  noBtn.style.zIndex = '500';
}

// ========== YES BUTTON ==========
function onYes() {
  // Save to localStorage
  localStorage.setItem('dateAccepted', 'yes');

  // Update card
  document.getElementById('main-heading').textContent = 'Yayyyyy!!! I knew it 😍❤️';
  document.getElementById('main-gif').src = CONFIG.gifHappy;
  document.getElementById('sub-text').style.display = 'none';
  document.getElementById('funny-msg').style.display = 'none';
  document.getElementById('btn-wrap').style.display = 'none';

  // Hide floating No button if it moved
  noBtn.style.display = 'none';

  // Start music
  playMusic();

  // Effects
  document.getElementById('glow-overlay').classList.add('active');
  triggerConfetti();

  // Show mute button
  document.getElementById('mute-btn').classList.add('visible');

  // After delay, show success screen
  setTimeout(() => {
    rainHearts();
    setTimeout(showSuccess, 2000);
  }, 1000);

  // Notify Google Sheet
  notifyGoogle();
}

// ========== MUSIC ==========
function playMusic() {
  music.volume = 0.5;
  music.play().catch(() => {
    // Autoplay blocked — wait for next interaction
    document.addEventListener('click', () => music.play().catch(()=>{}), { once: true });
  });
}

function toggleMute() {
  isMuted = !isMuted;
  music.muted = isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
}

// ========== CONFETTI ==========
function triggerConfetti() {
  const colors = ['#ff6b9d','#ff4d79','#ffd700','#ff8fab','#c0305a','#fff','#ff69b4','#ff1493'];
  for (let i = 0; i < 120; i++) {
    setTimeout(() => {
      let c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 10) + 'px';
      c.style.height = (8 + Math.random() * 14) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      let dur = 2 + Math.random() * 3;
      c.style.animationDuration = dur + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), (dur + 0.5) * 1000);
    }, i * 15);
  }
}

// ========== RAIN HEARTS ==========
function rainHearts() {
  let emojis = ['❤️','💕','💗','💖','💓','💝','🌸'];
  let interval = setInterval(() => {
    let h = document.createElement('div');
    h.className = 'rain-heart';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (16 + Math.random() * 20) + 'px';
    let dur = 2 + Math.random() * 2;
    h.style.animationDuration = dur + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
  }, 200);
  setTimeout(() => clearInterval(interval), 5000);
}

// ========== SUCCESS SCREEN ==========
function showSuccess() {
  let ss = document.getElementById('success-screen');
  ss.classList.add('show');
  spawnSparkles();
  // Keep raining hearts on success screen
  continuousRain();
}

function continuousRain() {
  let emojis = ['❤️','💕','💖','✨','🌸','💝'];
  setInterval(() => {
    let h = document.createElement('div');
    h.className = 'rain-heart';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (14 + Math.random() * 16) + 'px';
    let dur = 3 + Math.random() * 3;
    h.style.animationDuration = dur + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
  }, 350);
}

function spawnSparkles() {
  let sparkles = ['✨','⭐','💫','🌟'];
  for (let i = 0; i < 12; i++) {
    let s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    s.style.left = Math.random() * 90 + 5 + 'vw';
    s.style.top = Math.random() * 90 + 5 + 'vh';
    s.style.fontSize = (14 + Math.random() * 16) + 'px';
    let dur = 2 + Math.random() * 3;
    s.style.animationDuration = dur + 's';
    s.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(s);
  }
}

// ========== SCREENSHOT BUTTON ==========
function onScreenshot() {
  document.getElementById('screenshot-msg').classList.add('show');
}

// ========== GOOGLE SHEETS NOTIFICATION ==========
function notifyGoogle() {
  if (CONFIG.googleScriptUrl === 'PASTE_URL_HERE') return;
  let payload = {
    response: 'YES',
    timestamp: new Date().toISOString(),
    device: /Mobi|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
    browser: navigator.userAgent.substring(0, 80)
  };
  fetch(CONFIG.googleScriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ========== ALREADY SAID YES CHECK ==========
// (Runs on DOM load inside the DOMContentLoaded listener above)
